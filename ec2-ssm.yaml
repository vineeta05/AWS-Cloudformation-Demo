AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template that creates an EC2 instance accessible via
  AWS Systems Manager (SSM) Session Manager. An IAM role with the
  AmazonSSMManagedInstanceCore managed policy is created and attached
  to the instance through an instance profile.

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: >
      SSM parameter path for the latest Amazon Linux 2 AMI.
      You can override this with any valid AMI ID.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which the EC2 instance will be launched

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet in which the EC2 instance will be launched

Resources:
  # --------------------------------------------------------------------------
  # IAM Role that allows the EC2 instance to communicate with SSM
  # --------------------------------------------------------------------------
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role that grants the EC2 instance permissions to use SSM
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2SSMRole"

  # --------------------------------------------------------------------------
  # Instance Profile — wraps the IAM role so it can be attached to EC2
  # --------------------------------------------------------------------------
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  # --------------------------------------------------------------------------
  # Security Group — no inbound SSH required; SSM tunnels through HTTPS
  # --------------------------------------------------------------------------
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the SSM-managed EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow outbound HTTPS so the SSM agent can reach SSM endpoints
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow outbound HTTP for package manager updates
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: Allow outbound DNS lookups
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2SG"

  # --------------------------------------------------------------------------
  # EC2 Instance
  # --------------------------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2"

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  SSMConnectCommand:
    Description: AWS CLI command to start an SSM Session Manager session
    Value: !Sub "aws ssm start-session --target ${EC2Instance}"

  IAMRoleName:
    Description: Name of the IAM role attached to the EC2 instance
    Value: !Ref EC2SSMRole

  InstanceProfileName:
    Description: Name of the IAM instance profile attached to the EC2 instance
    Value: !Ref EC2InstanceProfile
