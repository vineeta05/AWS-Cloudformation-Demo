AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template that creates an EC2 instance accessible via
  AWS Systems Manager (SSM) Session Manager. An IAM role with the
  AmazonSSMManagedInstanceCore managed policy is created and attached
  to the instance through an instance profile.
  Supports both Public Subnet (with public IP) and Private Subnet (with VPC Endpoints).

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: >
      SSM parameter path for the latest Amazon Linux 2 AMI.
      You can override this with any valid AMI ID.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which the EC2 instance will be launched

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet in which the EC2 instance will be launched

  AssignPublicIp:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Set to true if launching in a PUBLIC subnet (instance gets a public IP).
      Set to false if launching in a PRIVATE subnet (VPC Endpoints will be created instead).

Conditions:
  IsPublicSubnet: !Equals [!Ref AssignPublicIp, "true"]
  IsPrivateSubnet: !Equals [!Ref AssignPublicIp, "false"]

Resources:

  # --------------------------------------------------------------------------
  # IAM Role that allows the EC2 instance to communicate with SSM
  # --------------------------------------------------------------------------
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role that grants the EC2 instance permissions to use SSM
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2SSMRole"

  # --------------------------------------------------------------------------
  # Instance Profile — wraps the IAM role so it can be attached to EC2
  # --------------------------------------------------------------------------
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  # --------------------------------------------------------------------------
  # Security Group — no inbound SSH required; SSM tunnels through HTTPS
  # --------------------------------------------------------------------------
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the SSM-managed EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow outbound HTTPS so the SSM agent can reach SSM endpoints
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow outbound HTTP for package manager updates
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: Allow outbound DNS lookups
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2SG"

  # --------------------------------------------------------------------------
  # Security Group for VPC Endpoints (used only for private subnet)
  # --------------------------------------------------------------------------
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsPrivateSubnet
    Properties:
      GroupDescription: Security group for SSM VPC Endpoints
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow HTTPS from EC2 instance to SSM endpoints
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-VPCEndpointSG"

  # --------------------------------------------------------------------------
  # EC2 Instance — PUBLIC subnet (with public IP assigned)
  # --------------------------------------------------------------------------
  EC2InstancePublic:
    Type: AWS::EC2::Instance
    Condition: IsPublicSubnet
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true      # ← Ensures public IP is assigned
          DeviceIndex: "0"
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2"

  # --------------------------------------------------------------------------
  # EC2 Instance — PRIVATE subnet (no public IP, uses VPC Endpoints)
  # --------------------------------------------------------------------------
  EC2InstancePrivate:
    Type: AWS::EC2::Instance
    Condition: IsPrivateSubnet
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: false     # ← No public IP for private subnet
          DeviceIndex: "0"
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-EC2"

  # --------------------------------------------------------------------------
  # VPC Endpoints for SSM — only created for PRIVATE subnet deployments
  # These 3 endpoints allow SSM to work without internet/public IP
  # --------------------------------------------------------------------------
  SSMEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivateSubnet
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ssm"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref SubnetId
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  SSMMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivateSubnet
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ssmmessages"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref SubnetId
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

  EC2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivateSubnet
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ec2messages"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref SubnetId
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true

# ------------------------------------------------------------------------------
# Outputs
# ------------------------------------------------------------------------------
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !If
      - IsPublicSubnet
      - !Ref EC2InstancePublic
      - !Ref EC2InstancePrivate

  PublicIp:
    Description: Public IP address (only available for public subnet deployments)
    Condition: IsPublicSubnet
    Value: !GetAtt EC2InstancePublic.PublicIp

  SSMConnectCommand:
    Description: AWS CLI command to start an SSM Session Manager session
    Value: !Sub
      - "aws ssm start-session --target ${InstanceId}"
      - InstanceId: !If
          - IsPublicSubnet
          - !Ref EC2InstancePublic
          - !Ref EC2InstancePrivate

  IAMRoleName:
    Description: Name of the IAM role attached to the EC2 instance
    Value: !Ref EC2SSMRole

  InstanceProfileName:
    Description: Name of the IAM instance profile attached to the EC2 instance
    Value: !Ref EC2InstanceProfile

  DeploymentType:
    Description: Whether this was deployed in a public or private subnet
    Value: !If
      - IsPublicSubnet
      - "Public Subnet - Instance has a public IP"
      - "Private Subnet - Using VPC Endpoints for SSM"
